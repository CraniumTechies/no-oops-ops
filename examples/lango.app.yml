name: lango

image:
  repository: lango-service

service:
  internal_port: 8080

healthcheck:
  test:
    - CMD
    - curl
    - -f
    - http://localhost:8080/lango/liveness
  start_period: 60s
  interval: 10s
  timeout: 10s
  retries: 3

env:
  file: lango.env.yml

rollout:
  parallelism: 1
  delay: 10s
  order: start-first
  failure_action: rollback
  restart_condition: on-failure
  restart_delay: 10s
  restart_max_attempts: 5
  restart_window: 70s
  readiness_timeout: 30s
  readiness_interval: 2s
